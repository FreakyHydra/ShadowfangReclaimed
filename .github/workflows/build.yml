name: Build Plugin

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build Worlds dependency
        run: |
          chmod +x gradlew
          ./gradlew :plugin:build
        working-directory: Borrowed/worlds

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build
        working-directory: Shadowfang-Core-Folia

      - name: Prepare artifact
        run: |
          cp Shadowfang-Core-Folia/build/libs/Shadowfang-Core-Folia-*.jar ShadowfangReclaimed.jar

      - uses: ncipollo/release-action@v1
        with:
          tag: latest
          artifacts: "ShadowfangReclaimed.jar"
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          name: "Latest Build"
          body: "Auto-built from commit ${{ github.sha }}"
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
